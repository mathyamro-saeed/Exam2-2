<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح الأوراق الذكي - معالجة الصور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; text-align: center; }
        .video-container { position: relative; max-width: 500px; margin: 0 auto; border: 4px solid #0d6efd; border-radius: 10px; overflow: hidden; }
        #videoInput { width: 100%; height: auto; }
        #canvasOutput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .status-box { max-width: 500px; margin: 20px auto; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container my-4">
        <h1 class="text-primary mb-2">مصحح الأوراق الإلكتروني 📱</h1>
        <p class="text-muted">الخطوة 2: كشف المربعات الأربعة الحاضنة للورقة</p>

        <div class="video-container">
            <video id="videoInput" autoplay playsinline></video>
            <canvas id="canvasOutput"></canvas>
        </div>

        <div class="status-box">
            <div id="opencv-status" class="alert alert-secondary">جاري تحميل محرك الذكاء الاصطناعي (OpenCV.js)...</div>
            <div id="detection-status" class="h5 text-danger">لم يتم العثور على الورقة بعد ❌</div>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvas = document.getElementById('canvasOutput');
        const ctx = canvas.getContext('2d');
        const openCvStatus = document.getElementById('opencv-status');
        const detectionStatus = document.getElementById('detection-status');
        
        let src, dst, gray, thresh, contours, hierarchy;
        let streaming = false;

        // تشغيل الكاميرا الخلفية
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 }, audio: false })
            .then(function(stream) {
                video.srcObject = stream;
                video.play();
            }).catch(err => alert("خطأ في تشغيل الكاميرا: " + err));

        // دالة تعمل تلقائياً فور تحميل مكتبة OpenCV.js
        function onOpenCvReady() {
            openCvStatus.className = "alert alert-success";
            openCvStatus.innerText = "🎯 تم تحميل محرك المعالجة بنجاح! وجه الكاميرا للورقة.";
            
            // ضبط أبعاد الكانفاس لتطابق الفيديو
            video.addEventListener('canplay', () => {
                if (!streaming) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // تهيئة مصفوفات المعالجة الخاصة بـ OpenCV
                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    gray = new cv.Mat();
                    thresh = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();
                    
                    streaming = true;
                    // بدء حلقة المعالجة المستمرة (Frame by Frame)
                    requestAnimationFrame(processVideo);
                }
            });
        }

        function processVideo() {
            if (!streaming) return;

            // 1. قراءة الإطار الحالي من الكاميرا
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            src.data.set(imageData.data);

            // 2. تحويل الصورة إلى رمادي ثم إلى أبيض وأسود حاد (Threshold)
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

            // 3. البحث عن كافة الأشكال والخطوط المحيطة (Contours)
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let detectedSquares = [];

            // 4. الفلترة بحثاً عن المربعات الأركان الأربعة لورقتك
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let perimeter = cv.arcLength(cnt, true);
                let approx = new cv.Mat();
                // تقريب الشكل لمعرفة عدد زواياه
                cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);

                // إذا كان الشكل يحتوي على 4 زوايا (مربع أو مستطيل) ومساحته معقولة
                if (approx.rows === 4 && cv.contourArea(cnt) > 100 && cv.contourArea(cnt) < 3000) {
                    let rect = cv.boundingRect(cnt);
                    let aspectRatio = rect.width / rect.height;
                    
                    // التأكد من أن نسبة الطول للعرض قريبة من المربع (1:1)
                    if (aspectRatio >= 0.8 && aspectRatio <= 1.2) {
                        detectedSquares.push(rect);
                    }
                }
                approx.delete();
            }

            // مسح الشاشة لرسم المؤشرات الجديدة
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 5. رسم مربعات خضراء فوق الأركان المكتشفة للتأكيد للمستخدم
            detectedSquares.forEach(rect => {
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 3;
                ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
            });

            // إذا وجدنا المربعات الأربعة (أو على الأقل المعالم الرئيسية للورقة)
            if (detectedSquares.length === 4) {
                detectionStatus.className = "h5 text-success";
                detectionStatus.innerText = "تم رصد أركان الورقة بنجاح! 📸";
                // (في الخطوة القادمة سنضع هنا أمر الاقتصاص والتصحيح التلقائي المباشر)
            } else {
                detectionStatus.className = "h5 text-danger";
                detectionStatus.innerText = `جاري البحث... (تم رصد ${detectedSquares.length} من أركان الورقة)`;
            }

            // استدعاء الإطار التالي تكرارياً
            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
