<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح الأوراق الذكي - النسخة التجريبية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .video-container { position: relative; max-width: 640px; margin: 0 auto; border: 4px solid #0d6efd; border-radius: 10px; overflow: hidden; }
        #videoInput { width: 100%; height: auto; transform: scaleX(1); }
        .status-box { background-color: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container text-center my-4">
        <h1 class="mb-3 text-primary">مصحح الأوراق الإلكتروني 📱</h1>
        <p class="text-muted">الخطوة الأولى: اختبار تشغيل الكاميرا الخلفية للجوال بنجاح</p>

        <div class="video-container mb-4">
            <video id="videoInput" autoplay playsinline></video>
        </div>

        <div class="status-box max-width: 640px; margin: 0 auto;">
            <h4 class="text-secondary">حالة النظام:</h4>
            <div id="status" class="alert alert-warning">جاري طلب إذن تشغيل الكاميرا...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoInput');
        const statusDiv = document.getElementById('status');

        // طلب تشغيل الكاميرا الخلفية للجوال تحديداً (environment) بدقة عالية
        const constraints = {
            video: {
                facingMode: { exact: "environment" }, // فرض الكاميرا الخلفية
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };

        // محاولة تشغيل الكاميرا
        navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                video.srcObject = stream;
                statusDiv.className = "alert alert-success";
                statusDiv.innerText = "🎯 الكاميرا تعمل بنجاح! جاهزون للخطوة التالية.";
            })
            .catch(function(err) {
                console.log("خطأ في الكاميرا الخلفية المحددة، محاولة تشغيل أي كاميرا متاحة...");
                // حل بديل في حال فِشل فرض الكاميرا الخلفية (مثل المتصفحات على الكمبيوتر)
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(function(fallbackStream) {
                        video.srcObject = fallbackStream;
                        statusDiv.className = "alert alert-info";
                        statusDiv.innerText = "⚠️ تم تشغيل الكاميرا الافتراضية (تأكد من استخدام الجوال والكاميرا الخلفية لاحقاً).";
                    })
                    .catch(function(error) {
                        statusDiv.className = "alert alert-danger";
                        statusDiv.innerText = "❌ فشل تشغيل الكاميرا. يرجى إعطاء صلاحية الكاميرا للمتصفح. الخطأ: " + error.message;
                    });
            });
    </script>
</body>
</html>
