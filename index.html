<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحح الأوراق الذكي - اقتصاص ومحاذاة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; text-align: center; }
        .video-container { position: relative; max-width: 500px; margin: 0 auto; border: 4px solid #0d6efd; border-radius: 10px; overflow: hidden; }
        #videoInput { width: 100%; height: auto; }
        #canvasOutput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .cropped-container { max-width: 300px; margin: 20px auto; border: 3px dashed #198754; padding: 5px; background: #fff; }
        #canvasCropped { width: 100%; height: auto; display: none; }
        .status-box { max-width: 500px; margin: 20px auto; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container my-4">
        <h1 class="text-primary mb-2">مصحح الأوراق الإلكتروني 📱</h1>
        <p class="text-muted">الخطوة 3: اقتصاص وتعديل زاوية الورقة تلقائياً</p>

        <div class="video-container">
            <video id="videoInput" autoplay playsinline></video>
            <canvas id="canvasOutput"></canvas>
        </div>

        <div class="status-box">
            <div id="detection-status" class="h5 text-danger">لم يتم العثور على الورقة بعد ❌</div>
        </div>

        <div class="cropped-container">
            <p class="text-success fw-bold mb-1">الورقة الملتقطة مستوية ومقصوصة:</p>
            <canvas id="canvasCropped"></canvas>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

    <script>
        const video = document.getElementById('videoInput');
        const canvas = document.getElementById('canvasOutput');
        const ctx = canvas.getContext('2d');
        const canvasCropped = document.getElementById('canvasCropped');
        const ctxCropped = canvasCropped.getContext('2d');
        const detectionStatus = document.getElementById('detection-status');
        
        let src, dst, gray, thresh, contours, hierarchy;
        let streaming = false;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 }, audio: false })
            .then(stream => { video.srcObject = stream; video.play(); })
            .catch(err => alert("خطأ في الكاميرا: " + err));

        function onOpenCvReady() {
            detectionStatus.className = "alert alert-info";
            detectionStatus.innerText = "🎯 المحرك جاهز، وجه الكاميرا نحو الورقة بالكامل.";
            
            video.addEventListener('canplay', () => {
                if (!streaming) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // الأبعاد الثابتة التي نريد تحويل الورقة المقصوصة إليها (عرض 500 وارتفاع 700 بكسل كمثال مثالي)
                    canvasCropped.width = 500;
                    canvasCropped.height = 700;

                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    gray = new cv.Mat();
                    thresh = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();
                    
                    streaming = true;
                    requestAnimationFrame(processVideo);
                }
            });
        }

        function processVideo() {
            if (!streaming) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            src.data.set(imageData.data);

            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
            cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let detectedSquares = [];

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let perimeter = cv.arcLength(cnt, true);
                let approx = new cv.Mat();
                cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true);

                if (approx.rows === 4 && cv.contourArea(cnt) > 100 && cv.contourArea(cnt) < 4000) {
                    let rect = cv.boundingRect(cnt);
                    let aspectRatio = rect.width / rect.height;
                    if (aspectRatio >= 0.7 && aspectRatio <= 1.3) {
                        // حفظ مركز المربع (X, Y) لترتيب الأركان
                        detectedSquares.push({
                            x: rect.x + rect.width/2,
                            y: rect.y + rect.height/2,
                            rect: rect
                        });
                    }
                }
                approx.delete();
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // رسم المربعات المرصودة
            detectedSquares.forEach(sq => {
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 3;
                ctx.strokeRect(sq.rect.x, sq.rect.y, sq.rect.width, sq.rect.height);
            });

            // إذا وجدنا المربعات الأربعة بالضبط، نقوم بعملية القص والمحاذاة الذكية
            if (detectedSquares.length === 4) {
                detectionStatus.className = "h5 text-success animate-pulse";
                detectionStatus.innerText = "تم رصد أركان الورقة وجاري المحاذاة! 📸";

                // ترتيب النقاط الأربعة: [أعلى-يسار, أعلى-يمين, أسفل-يمين, أسفل-يسار]
                detectedSquares.sort((a, b) => a.y - b.y);
                let topPoints = detectedSquares.slice(0, 2).sort((a, b) => a.x - b.x);
                let bottomPoints = detectedSquares.slice(2, 4).sort((a, b) => a.x - b.x);
                
                let topLeft = topPoints[0];
                let topRight = topPoints[1];
                let bottomLeft = bottomPoints[0];
                let bottomRight = bottomPoints[1];

                // مصفوفة النقاط المصدرية من الكاميرا
                let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
                    topLeft.x, topLeft.y,
                    topRight.x, topRight.y,
                    bottomRight.x, bottomRight.y,
                    bottomLeft.x, bottomLeft.y
                ]);

                // مصفوفة النقاط المستهدفة للقص المستوي (أبعاد الكانفاس الصغير الثابتة)
                let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
                    0, 0,
                    500, 0,
                    500, 700,
                    0, 700
                ]);

                // حساب مصفوفة التحويل الهندسي واقتصاص الصورة
                let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
                let croppedMat = new cv.Mat();
                cv.warpPerspective(src, croppedMat, M, new cv.Size(500, 700));

                // عرض الورقة المقصوصة والمستقيمة للمستخدم في الكانفاس الصغير
                canvasCropped.style.display = "block";
                cv.imshow('canvasCropped', croppedMat);

                // تنظيف المصفوفات لتوفير الذاكرة
                srcCoords.delete(); dstCoords.delete(); M.delete(); croppedMat.delete();
            } else {
                detectionStatus.className = "h5 text-danger";
                detectionStatus.innerText = `جاري البحث... (تم رصد ${detectedSquares.length} من أركان الورقة)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
